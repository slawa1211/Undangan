<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Digital</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #e6f7ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 1.2s ease-in-out;
    }

    h1 {
      color: #e91e63;
      margin-bottom: 10px;
    }

    .nama {
      font-size: 22px;
      font-weight: bold;
      margin: 10px 0;
    }

    .detail {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 20px;
      background: #e91e63;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #c2185b;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Undangan Pernikahan</h1>
    <div class="nama">Aulia & Rizky</div>

    <p class="detail">
      Dengan hormat, kami mengundang Anda untuk hadir pada acara pernikahan kami:<br><br>

      📅 Sabtu, 10 Mei 2026<br>
      🕐 10.00 WIB - selesai<br>
      📍 Gedung Serbaguna Bahagia
    </p>

    <a class="btn" href="https://maps.google.com" target="_blank">
      Lihat Lokasi
    </a>
  </div>

</body>
</html>
